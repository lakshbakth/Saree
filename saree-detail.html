<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crimson Kanjivaram Silk — Saree Story</title>
  <meta name="description" content="A masterpiece in deep crimson with gold zari borders. Hand-woven on traditional pit looms in Kanchipuram, Tamil Nadu. Pure mulberry silk." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: #222222;
      --gold: #C9A462;
      --gold-muted: rgba(201,164,98,0.12);
      --gold-light: #E2C17A;
      --text: #F0EAE0;
      --text-secondary: #888880;
      --text-muted: #555550;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0; z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(8,8,8,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-light); }
    .nav-cta {
      font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gold); text-decoration: none;
      border: 1px solid var(--gold-muted); padding: 8px 20px; border-radius: 2px;
    }

    /* ── BREADCRUMB ── */
    .breadcrumb-bar {
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .breadcrumb-bar a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb-bar a:hover { color: var(--gold-light); }
    .breadcrumb-bar span { opacity: 0.4; }
    .breadcrumb-bar .current { color: var(--text-secondary); }

    /* ── DETAIL LAYOUT ── */
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px;
      gap: 80px;
    }

    /* ── GALLERY ── */
    .gallery-col { position: sticky; top: 80px; height: fit-content; }

    .gallery-main {
      aspect-ratio: 3/4;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      position: relative;
    }

    .main-swatch {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #8B0000 0%, #C41E3A 25%, #8B0000 50%, #6B0000 75%, #8B0000 100%);
      position: relative;
      overflow: hidden;
      transition: opacity 0.3s;
    }

    .swatches = {
      kanjivaram: "linear-gradient(135deg, #8B0000 0%, #C41E3A 25%, #8B0000 50%, #6B0000 75%, #8B0000 100%)",
    }

    .swatch-overlay {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.03) 8px, rgba(255,255,255,0.03) 9px);
    }
    .swatch-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(201,164,98,0.1) 40%, rgba(201,164,98,0.2) 50%, rgba(201,164,98,0.1) 60%, transparent 100%);
    }

    .gallery-badge {
      position: absolute;
      top: 20px; left: 20px;
      background: var(--bg);
      border: 1px solid var(--gold-muted);
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 2px;
    }

    .gallery-thumbnails {
      display: flex;
      gap: 10px;
    }

    .thumb {
      width: 64px;
      aspect-ratio: 3/4;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }
    .thumb:hover, .thumb.active { border-color: var(--gold); }

    .thumb-swatch {
      width: 100%; height: 100%;
      position: relative;
    }
    .thumb-1 { background: linear-gradient(135deg, #8B0000 0%, #C41E3A 40%, #8B0000 100%); }
    .thumb-2 { background: linear-gradient(160deg, #6B0000 0%, #9B1020 40%, #6B0000 100%); }
    .thumb-3 { background: linear-gradient(110deg, #C41E3A 0%, #8B0000 40%, #C41E3A 100%); }
    .thumb-4 { background: linear-gradient(135deg, #7B0000 0%, #A81520 40%, #7B0000 100%); }

    /* ── PRODUCT INFO ── */
    .info-col {}

    .product-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .product-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .product-name {
      font-family: var(--serif);
      font-size: clamp(36px, 4vw, 54px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .product-name em { font-style: italic; color: var(--gold-light); }

    .product-origin {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .origin-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    .product-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }
    .tag {
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .tag.gold { border-color: var(--gold-muted); color: var(--gold-light); }

    /* ── SPECS TABLE ── */
    .specs-block {
      margin-bottom: 40px;
    }

    .specs-title {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .specs-grid {
      display: grid;
      gap: 0;
    }

    .spec-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(34,34,34,0.5);
      align-items: start;
    }

    .spec-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .spec-value {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .spec-value strong { color: var(--text); font-weight: 400; }

    /* ── DESCRIPTION ── */
    .description-block {
      margin-bottom: 40px;
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      position: relative;
    }

    .desc-quote {
      font-family: var(--serif);
      font-size: 48px;
      color: var(--gold-muted);
      line-height: 1;
      margin-bottom: 8px;
    }

    .desc-text {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.8;
      font-style: italic;
    }

    .desc-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .desc-body {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.9;
    }

    /* ── CARE INSTRUCTIONS ── */
    .care-block {
      margin-bottom: 40px;
    }

    .care-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .care-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .care-icon {
      font-size: 20px;
      flex-shrink: 0;
      line-height: 1;
    }

    .care-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .care-text strong {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 2px;
    }

    /* ── WEAVER STORY ── */
    .weaver-block {
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--gold-muted);
      border-radius: 4px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }

    .weaver-block::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .weaver-eyebrow {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .weaver-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 12px;
    }

    .weaver-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    /* ── SIMILAR SAREES ── */
    .similar-section {
      padding: 80px 48px;
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--serif);
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 40px;
    }
    .section-title em { font-style: italic; color: var(--gold-light); }

    .similar-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .similar-card {
      text-decoration: none;
      color: inherit;
      display: block;
      overflow: hidden;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.3s, transform 0.3s;
    }
    .similar-card:hover { border-color: var(--gold-muted); transform: translateY(-3px); }

    .similar-image {
      aspect-ratio: 3/4;
      overflow: hidden;
    }

    .similar-swatch {
      width: 100%; height: 100%;
      position: relative;
    }
    .s1 { background: linear-gradient(135deg, #1B3A6B 0%, #2E5FA3 30%, #1B3A6B 60%, #142D52 100%); }
    .s2 { background: linear-gradient(135deg, #2D6B45 0%, #3D8B5E 30%, #2D6B45 60%, #1E4A30 100%); }
    .s3 { background: linear-gradient(135deg, #5B2D82 0%, #7B3DAF 30%, #5B2D82 60%, #3D1A5A 100%); }

    .similar-body { padding: 14px 16px 18px; }
    .similar-region { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
    .similar-name { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--text); line-height: 1.2; }

    /* ── FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 40px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-copy { font-size: 12px; color: var(--text-muted); }
    .footer-logo { font-family: var(--serif); font-size: 18px; color: var(--gold-light); text-decoration: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .detail-layout { padding: 40px 32px; gap: 48px; }
      nav { padding: 16px 32px; }
      .breadcrumb-bar { padding: 16px 32px; }
      .similar-section { padding: 60px 32px; }
      footer { padding: 32px; }
    }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .nav-cta { display: none; }
      .breadcrumb-bar { padding: 12px 20px; }
      .detail-layout { grid-template-columns: 1fr; padding: 24px 20px; gap: 40px; }
      .gallery-col { position: static; }
      .gallery-thumbnails { overflow-x: auto; padding-bottom: 8px; }
      .care-grid { grid-template-columns: 1fr; }
      .similar-grid { grid-template-columns: repeat(2, 1fr); }
      .similar-section { padding: 48px 20px; }
      footer { padding: 24px 20px; flex-direction: column; align-items: flex-start; }
    }

    @media (max-width: 480px) {
      .similar-grid { grid-template-columns: 1fr; }
      .spec-row { grid-template-columns: 110px 1fr; }
    }
  </style>
</head>

  <nav>

  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb-bar">
    <a href="index.html">Home</a>
    <span>›</span>
    <a href="collection.html">Collections</a>
    <span>›</span>
    <span class="current" id="breadcrumb-current">Loading…</span>
  </div>

  <!-- DETAIL LAYOUT — filled dynamically -->
  <div class="detail-layout" id="detail-layout">
    <div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--text-muted);font-family:var(--serif);font-size:20px;">
      Loading saree details…
    </div>
  </div>

  <!-- SIMILAR SAREES — filled dynamically -->
  <div class="similar-section" id="similar-section" style="display:none">
    <div class="section-label">You May Also Like</div>
    <h2 class="section-title" id="similar-title">Similar <em>Sarees</em></h2>
    <div class="similar-grid" id="similar-grid"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="index.html" class="footer-logo">Saree Story</a>
    <span class="footer-copy">© 2025 Saree Story. A celebration of Indian craft.</span>
  </footer>

  <script>
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const SHEET_ID = 'YOUR_SHEET_ID_HERE';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    // ── COLOR → SWATCH ────────────────────────────────────────────────────────
    const swatchMap = {
      crimson:'linear-gradient(135deg,#8B0000 0%,#C41E3A 30%,#8B0000 70%,#6B0000 100%)',
      red:'linear-gradient(135deg,#8B0000 0%,#C41E3A 40%,#8B0000 100%)',
      maroon:'linear-gradient(135deg,#800000 0%,#B22222 40%,#800000 100%)',
      blue:'linear-gradient(135deg,#1B3A6B 0%,#2E5FA3 30%,#1B3A6B 60%,#142D52 100%)',
      'royal blue':'linear-gradient(135deg,#1B3A6B 0%,#2E5FA3 40%,#1B3A6B 100%)',
      navy:'linear-gradient(135deg,#001a4d 0%,#003080 40%,#001a4d 100%)',
      ivory:'linear-gradient(135deg,#F5F0E8 0%,#E8DCC8 30%,#F5F0E8 60%,#EDE4D0 100%)',
      white:'linear-gradient(135deg,#F5F0E8 0%,#E8DCC8 40%,#F5F0E8 100%)',
      cream:'linear-gradient(135deg,#FFF8E7 0%,#EDE0C4 40%,#FFF8E7 100%)',
      pink:'linear-gradient(135deg,#C44B8A 0%,#E8729A 30%,#C44B8A 60%,#A33572 100%)',
      rose:'linear-gradient(135deg,#C44B8A 0%,#E8729A 40%,#C44B8A 100%)',
      green:'linear-gradient(135deg,#2D6B45 0%,#3D8B5E 30%,#2D6B45 60%,#1E4A30 100%)',
      emerald:'linear-gradient(135deg,#2D6B45 0%,#3D8B5E 40%,#2D6B45 100%)',
      purple:'linear-gradient(135deg,#5B2D82 0%,#7B3DAF 30%,#5B2D82 60%,#3D1A5A 100%)',
      amethyst:'linear-gradient(135deg,#5B2D82 0%,#7B3DAF 40%,#5B2D82 100%)',
      gold:'linear-gradient(135deg,#B8860B 0%,#DAA520 40%,#B8860B 100%)',
      orange:'linear-gradient(135deg,#CC5500 0%,#FF7700 40%,#CC5500 100%)',
      teal:'linear-gradient(135deg,#008080 0%,#20B2AA 40%,#008080 100%)',
    };
    const defaultSwatch = swatchMap.crimson;

    // ── CSV PARSER ────────────────────────────────────────────────────────────
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseCSVRow(lines[0]).map(h => h.trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const vals = parseCSVRow(line);
        const obj = {};
        headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
        return obj;
      });
    }
    function parseCSVRow(row) {
      const result = []; let inQ = false, cur = '';
      for (let i = 0; i < row.length; i++) {
        if (row[i]==='"'&&!inQ) inQ=true;
        else if (row[i]==='"'&&inQ){if(row[i+1]==='"'){cur+='"';i++;}else inQ=false;}
        else if (row[i]===','&&!inQ){result.push(cur);cur='';}
        else cur+=row[i];
      }
      result.push(cur); return result;
    }
    function getDriveUrl(url) {
      if (!url||!url.trim()) return null;
      const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
      return url.startsWith('http') ? url : null;
    }
    function getSwatchBg(color) {
      return swatchMap[(color||'').toLowerCase().trim()] || defaultSwatch;
    }

    // ── GALLERY HELPERS ───────────────────────────────────────────────────────
    let galleryImages = [];
    function selectThumb(el, idx) {
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      const main = document.getElementById('mainMedia');
      main.style.opacity = '0';
      setTimeout(() => {
        main.style.background = galleryImages[idx] || getSwatchBg('');
        main.style.opacity = '1';
      }, 150);
    }

    // ── RENDER DETAIL PAGE ────────────────────────────────────────────────────
    function renderDetail(s, allSarees) {
      // Page title + breadcrumb
      document.title = `${s.name} — Saree Story`;
      document.getElementById('breadcrumb-current').textContent = s.name;

      // Build swatch backgrounds for thumbnails
      const baseBg = getSwatchBg(s.color);
      const variants = [
        baseBg,
        baseBg.replace('135deg','160deg'),
        baseBg.replace('135deg','110deg'),
        baseBg.replace('135deg','145deg'),
      ];
      galleryImages = variants;

      // Main image
      const imgUrl = getDriveUrl(s.imageUrl);
      const mainMediaHTML = imgUrl
        ? `<img id="mainMedia" src="${imgUrl}" alt="${s.name}"
             style="width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.3s;"
             onerror="this.outerHTML='<div id=mainMedia style=width:100%;height:100%;background:${baseBg};transition:opacity 0.3s;position:relative><div class=swatch-overlay></div><div class=swatch-shimmer></div></div>'">`
        : `<div id="mainMedia" style="width:100%;height:100%;background:${baseBg};transition:opacity 0.3s;position:relative;">
             <div class="swatch-overlay"></div><div class="swatch-shimmer"></div>
           </div>`;

      const tags = (s.tags||'').split('|').filter(Boolean);

      // Specs — only show rows that have data
      const specRows = [
        ['Fabric',       s.fabric],
        ['Weave Type',   s.name],
        ['Zari',         s.zari],
        ['Length',       s.length],
        ['Width',        s.width],
        ['Weight',       s.weight],
        ['Motifs',       s.motifs],
        ['Origin',       s.regionLabel || s.region],
        ['Weaving Time', s.weavingTime],
      ].filter(([,v]) => v).map(([label, val]) =>
        `<div class="spec-row"><span class="spec-label">${label}</span><span class="spec-value"><strong>${val}</strong></span></div>`
      ).join('');

      // Care instructions
      const care = [
        ['🫧', s.careWash   || 'Dry clean recommended to preserve fabric and embellishments.'],
        ['🌿', s.careStorage|| 'Fold with muslin cloth. Store in a cool, dry place.'],
        ['🌡️', s.careIron   || 'Iron on reverse side at medium heat. Avoid embellishments.'],
        ['💨', s.careAir    || 'Air the saree after every use before storing.'],
      ];

      document.getElementById('detail-layout').innerHTML = `
        <!-- GALLERY -->
        <div class="gallery-col">
          <div class="gallery-main">${mainMediaHTML}${s.badge?`<div class="gallery-badge">${s.badge}</div>`:''}</div>
          <div class="gallery-thumbnails">
            ${variants.map((bg, i) => `
              <div class="thumb${i===0?' active':''}" onclick="selectThumb(this,${i})">
                <div style="width:100%;height:100%;background:${bg};position:relative;"><div class="swatch-overlay"></div></div>
              </div>`).join('')}
          </div>
        </div>

        <!-- INFO -->
        <div class="info-col">
          <div class="product-label">${s.name.split(' ').slice(1).join(' ')||s.name} · ${s.regionLabel||s.region}</div>
          <h1 class="product-name">${s.name.split(' ')[0]}<br><em>${s.name.split(' ').slice(1).join(' ')}</em></h1>
          <div class="product-origin">
            <div class="origin-dot"></div>
            Handwoven in ${s.regionLabel||s.region}
          </div>
          <div class="product-tags">
            ${tags.slice(0,3).map(t=>`<span class="tag gold">${t}</span>`).join('')}
            ${tags.slice(3).map(t=>`<span class="tag">${t}</span>`).join('')}
          </div>

          <div class="description-block">
            <div class="desc-quote">"</div>
            <p class="desc-text">${s.shortDesc||s.description||''}</p>
            ${s.description&&s.description!==s.shortDesc?`<div class="desc-divider"></div><p class="desc-body">${s.description}</p>`:''}
          </div>

          ${specRows ? `<div class="specs-block"><div class="specs-title">Specifications</div><div class="specs-grid">${specRows}</div></div>` : ''}

          <div class="care-block">
            <div class="specs-title">Care Instructions</div>
            <div class="care-grid">
              ${care.map(([icon,text])=>`
                <div class="care-item">
                  <div class="care-icon">${icon}</div>
                  <div class="care-text">${text}</div>
                </div>`).join('')}
            </div>
          </div>

          ${s.weaverStory ? `
          <div class="weaver-block">
            <div class="weaver-eyebrow">The Craft · Provenance</div>
            <div class="weaver-title">${s.weaverTitle||'The Making'}</div>
            <p class="weaver-desc">${s.weaverStory}</p>
          </div>` : ''}
        </div>`;

      // Similar sarees: same fabric, different id
      const similar = allSarees.filter(x => x.id !== s.id && x.fabric === s.fabric).slice(0, 3);
      if (similar.length) {
        document.getElementById('similar-section').style.display = 'block';
        document.getElementById('similar-title').innerHTML = `Similar <em>${(s.fabric||'').replace(/-/g,' ')} Sarees</em>`;
        document.getElementById('similar-grid').innerHTML = similar.map(x => {
          const imgUrl = getDriveUrl(x.imageUrl);
          const imgHTML = imgUrl
            ? `<img src="${imgUrl}" alt="${x.name}" style="width:100%;height:100%;object-fit:cover;" loading="lazy">`
            : `<div style="width:100%;height:100%;background:${getSwatchBg(x.color)};position:relative;"><div class="swatch-overlay"></div><div class="swatch-shimmer"></div></div>`;
          return `
            <a href="saree-detail.html?id=${x.id}" class="similar-card">
              <div class="similar-image">${imgHTML}</div>
              <div class="similar-body">
                <div class="similar-region">${x.regionLabel||x.region}</div>
                <div class="similar-name">${x.name}</div>
              </div>
            </a>`;
        }).join('');
      }
    }

    // ── FETCH & INIT ──────────────────────────────────────────────────────────
    async function loadDetail() {
      const id = new URLSearchParams(window.location.search).get('id');
      const layout = document.getElementById('detail-layout');

      if (!id) {
        layout.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--text-muted);font-family:var(--serif);font-size:20px;">No saree selected. <a href="collection.html" style="color:var(--gold)">Browse collection</a></div>`;
        return;
      }

      try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error();
        const all = parseCSV(await res.text()).filter(s => s.id && s.name);
        const saree = all.find(s => s.id === id);

        if (!saree) {
          layout.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--text-muted);font-family:var(--serif);font-size:20px;">Saree not found. <a href="collection.html" style="color:var(--gold)">Browse collection</a></div>`;
          return;
        }

        renderDetail(saree, all);

      } catch {
        layout.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--text-muted);font-family:var(--serif);font-size:20px;">Could not load details. <a href="collection.html" style="color:var(--gold)">Browse collection</a></div>`;
      }
    }

    loadDetail();
  </script>
</body>
</html>
