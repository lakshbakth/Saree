<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections — Saree Story</title>
  <meta name="description" content="Browse handpicked Indian sarees — Kanjivaram, Banarasi, Chanderi, Bandhani and more. Filter by fabric, occasion, and region." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #faf8f5;
      --surface-2: #f3efe8;
      --border: #e5ddd0;
      --gold: #9A7420;
      --gold-muted: rgba(154,116,32,0.1);
      --gold-light: #7A5C10;
      --text: #1c1510;
      --text-secondary: #6b6058;
      --text-muted: #a09080;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--gold-light); }

    .nav-cta {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid var(--gold-muted);
      padding: 8px 20px;
      border-radius: 2px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 64px 48px 48px;
      border-bottom: 1px solid var(--border);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--gold-light); }
    .breadcrumb-sep { opacity: 0.4; }

    .page-title {
      font-family: var(--serif);
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .page-title em { font-style: italic; color: var(--gold-light); }

    .page-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* ── LAYOUT ── */
    .collection-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      min-height: 80vh;
    }

    /* ── SIDEBAR FILTERS ── */
    .filters-sidebar {
      padding: 40px 32px;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 65px;
      height: calc(100vh - 65px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .filters-sidebar h3 {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .filter-group {
      margin-bottom: 32px;
    }

    .filter-group-title {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .filter-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 300;
      padding: 6px 12px;
      border-radius: 2px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--border); }
    .filter-btn.active { color: var(--gold-light); border-color: var(--gold-muted); background: var(--gold-muted); }

    .filter-count {
      font-size: 11px;
      color: var(--text-muted);
    }

    .filter-clear {
      display: block;
      margin-top: 24px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .filter-clear:hover { color: var(--gold-light); }

    /* ── MAIN CONTENT ── */
    .main-content {
      padding: 40px 48px;
    }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .results-count {
      font-size: 13px;
      color: var(--text-muted);
    }
    .results-count strong {
      color: var(--text);
      font-weight: 400;
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .active-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      background: var(--gold-muted);
      border: 1px solid rgba(201,164,98,0.2);
      border-radius: 20px;
      color: var(--gold-light);
    }

    .active-tag button {
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      margin-left: 2px;
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 12px;
      font-family: var(--sans);
      padding: 6px 12px;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }
    .sort-select:focus { border-color: var(--gold-muted); }

    /* ── GRID ── */
    .grid-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .grid-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 8px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
    }
    .grid-toggle.active,
    .grid-toggle:hover { border-color: var(--gold-muted); color: var(--gold-light); }

    .sarees-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      transition: all 0.3s;
    }

    .sarees-grid.two-col { grid-template-columns: repeat(2, 1fr); }

    /* ── SAREE CARD ── */
    .saree-card {
      position: relative;
      text-decoration: none;
      color: inherit;
      display: block;
      overflow: hidden;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.3s, transform 0.3s;
    }
    .saree-card:hover { border-color: var(--gold-muted); transform: translateY(-4px); }

    .card-image {
      aspect-ratio: 3/4;
      overflow: hidden;
      position: relative;
    }

    .card-swatch {
      width: 100%; height: 100%;
      position: relative;
    }

    .swatch-kanjivaram { background: linear-gradient(135deg, #8B0000 0%, #C41E3A 25%, #8B0000 50%, #6B0000 75%, #8B0000 100%); }
    .swatch-banarasi   { background: linear-gradient(135deg, #1B3A6B 0%, #2E5FA3 30%, #1B3A6B 60%, #142D52 100%); }
    .swatch-chanderi   { background: linear-gradient(135deg, #F5F0E8 0%, #E8DCC8 30%, #F5F0E8 60%, #EDE4D0 100%); }
    .swatch-bandhani   { background: linear-gradient(135deg, #C44B8A 0%, #E8729A 30%, #C44B8A 60%, #A33572 100%); }
    .swatch-paithani   { background: linear-gradient(135deg, #2D6B45 0%, #3D8B5E 30%, #2D6B45 60%, #1E4A30 100%); }
    .swatch-mysore     { background: linear-gradient(135deg, #5B2D82 0%, #7B3DAF 30%, #5B2D82 60%, #3D1A5A 100%); }

    .swatch-overlay {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.03) 8px, rgba(255,255,255,0.03) 9px);
    }
    .swatch-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(201,164,98,0.12) 40%, rgba(201,164,98,0.22) 50%, rgba(201,164,98,0.12) 60%, transparent 100%);
    }

    .card-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }
    .card-badge.new { border-color: var(--gold-muted); color: var(--gold); }

    .card-hover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8,8,8,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saree-card:hover .card-hover-overlay { opacity: 1; }

    .hover-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-light);
      border: 1px solid var(--gold-muted);
      padding: 8px 20px;
      border-radius: 2px;
    }

    .card-body { padding: 16px 18px 20px; }

    .card-region {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .card-name {
      font-family: var(--serif);
      font-size: 19px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .card-fabric {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tag {
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* ── NO RESULTS ── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .no-results h3 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 300;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* ── MOBILE FILTER TOGGLE ── */
    .mobile-filter-btn {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 2px;
      cursor: pointer;
      font-family: var(--sans);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 40px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 80px;
    }
    .footer-copy { font-size: 12px; color: var(--text-muted); }
    .footer-logo { font-family: var(--serif); font-size: 18px; color: var(--gold-light); text-decoration: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .sarees-grid { grid-template-columns: repeat(2, 1fr); }
      nav { padding: 16px 32px; }
      .page-header { padding: 48px 32px 36px; }
      .main-content { padding: 32px; }
    }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .nav-cta { display: none; }
      .page-header { padding: 32px 20px; }
      .collection-layout { grid-template-columns: 1fr; }
      .filters-sidebar {
        position: static;
        height: auto;
        padding: 24px 20px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: none;
      }
      .filters-sidebar.open { display: block; }
      .mobile-filter-btn { display: block; }
      .main-content { padding: 24px 20px; }
      .sarees-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      footer { padding: 32px 20px; }
    }

    @media (max-width: 480px) {
      .sarees-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <div class="page-header">

      <a href="index.html">Home</a>

      <span>Collections</span>
    </div>
    <h1 class="page-title">All <em>Collections</em></h1>
    <p class="page-subtitle" id="page-subtitle">Showing all pieces from our catalogue</p>
  </div>

  <!-- LAYOUT -->
  <div class="collection-layout">

    <!-- SIDEBAR -->
    <aside class="filters-sidebar" id="filterSidebar">
      <h3>Filter By</h3>

      <div class="filter-group">
        <div class="filter-group-title">Fabric</div>
        <div class="filter-options" id="fabric-filters"><span style="font-size:12px;color:var(--text-muted)">Loading…</span></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Occasion</div>
        <div class="filter-options" id="occasion-filters"><span style="font-size:12px;color:var(--text-muted)">Loading…</span></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Region</div>
        <div class="filter-options" id="region-filters"><span style="font-size:12px;color:var(--text-muted)">Loading…</span></div>
      </div>
      <button class="filter-clear" onclick="clearAllFilters()">Clear All Filters</button>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <div class="results-bar">
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <button class="mobile-filter-btn" onclick="document.getElementById('filterSidebar').classList.toggle('open')">
            ⊞ Filters
          </button>
          <div class="results-count"><strong id="result-count">6</strong> pieces</div>
          <div class="active-filters" id="active-filters"></div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <select class="sort-select" onchange="sortSarees(this.value)">
            <option value="default">Sort: Default</option>
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
          </select>
          <div class="grid-controls">
            <button class="grid-toggle active" onclick="setGrid(3, this)" title="3 columns">⊞</button>
            <button class="grid-toggle" onclick="setGrid(2, this)" title="2 columns">⊟</button>
          </div>
        </div>
      </div>

      <div class="sarees-grid" id="sarees-grid">
        <!-- Cards injected by JS -->
      </div>
    </main>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="index.html" class="footer-logo">Saree Story</a>
    <span class="footer-copy">© 2025 Saree Story. A celebration of Indian craft.</span>
  </footer>

  <script>
    // ── CONFIG — paste your Google Sheet ID here ──────────────────────────────
    const SHEET_ID = 'YOUR_SHEET_ID_HERE';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    // ── COLOR → CSS GRADIENT MAP ──────────────────────────────────────────────
    const swatchMap = {
      crimson:     'linear-gradient(135deg,#8B0000 0%,#C41E3A 30%,#8B0000 70%,#6B0000 100%)',
      red:         'linear-gradient(135deg,#8B0000 0%,#C41E3A 40%,#8B0000 100%)',
      maroon:      'linear-gradient(135deg,#800000 0%,#B22222 40%,#800000 100%)',
      blue:        'linear-gradient(135deg,#1B3A6B 0%,#2E5FA3 30%,#1B3A6B 60%,#142D52 100%)',
      'royal blue':'linear-gradient(135deg,#1B3A6B 0%,#2E5FA3 40%,#1B3A6B 100%)',
      navy:        'linear-gradient(135deg,#001a4d 0%,#003080 40%,#001a4d 100%)',
      ivory:       'linear-gradient(135deg,#F5F0E8 0%,#E8DCC8 30%,#F5F0E8 60%,#EDE4D0 100%)',
      white:       'linear-gradient(135deg,#F5F0E8 0%,#E8DCC8 40%,#F5F0E8 100%)',
      cream:       'linear-gradient(135deg,#FFF8E7 0%,#EDE0C4 40%,#FFF8E7 100%)',
      pink:        'linear-gradient(135deg,#C44B8A 0%,#E8729A 30%,#C44B8A 60%,#A33572 100%)',
      rose:        'linear-gradient(135deg,#C44B8A 0%,#E8729A 40%,#C44B8A 100%)',
      magenta:     'linear-gradient(135deg,#8B0067 0%,#CC0099 40%,#8B0067 100%)',
      green:       'linear-gradient(135deg,#2D6B45 0%,#3D8B5E 30%,#2D6B45 60%,#1E4A30 100%)',
      emerald:     'linear-gradient(135deg,#2D6B45 0%,#3D8B5E 40%,#2D6B45 100%)',
      teal:        'linear-gradient(135deg,#008080 0%,#20B2AA 40%,#008080 100%)',
      purple:      'linear-gradient(135deg,#5B2D82 0%,#7B3DAF 30%,#5B2D82 60%,#3D1A5A 100%)',
      amethyst:    'linear-gradient(135deg,#5B2D82 0%,#7B3DAF 40%,#5B2D82 100%)',
      violet:      'linear-gradient(135deg,#4B0082 0%,#8B00FF 40%,#4B0082 100%)',
      gold:        'linear-gradient(135deg,#B8860B 0%,#DAA520 40%,#B8860B 100%)',
      yellow:      'linear-gradient(135deg,#B8860B 0%,#DAA520 40%,#B8860B 100%)',
      orange:      'linear-gradient(135deg,#CC5500 0%,#FF7700 40%,#CC5500 100%)',
      black:       'linear-gradient(135deg,#111 0%,#333 40%,#111 100%)',
    };
    const defaultSwatch = swatchMap.crimson;

    // ── CSV PARSER ────────────────────────────────────────────────────────────
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseCSVRow(lines[0]).map(h => h.trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const vals = parseCSVRow(line);
        const obj = {};
        headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
        return obj;
      });
    }
    function parseCSVRow(row) {
      const result = []; let inQ = false, cur = '';
      for (let i = 0; i < row.length; i++) {
        if (row[i] === '"' && !inQ) inQ = true;
        else if (row[i] === '"' && inQ) { if (row[i+1]==='"'){cur+='"';i++;}else inQ=false; }
        else if (row[i] === ',' && !inQ) { result.push(cur); cur = ''; }
        else cur += row[i];
      }
      result.push(cur); return result;
    }

    // ── IMAGE HELPERS ─────────────────────────────────────────────────────────
    function getDriveUrl(url) {
      if (!url || !url.trim()) return null;
      const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w600`;
      return url.startsWith('http') ? url : null;
    }
    function getSwatchBg(color) {
      return swatchMap[(color||'').toLowerCase().trim()] || defaultSwatch;
    }
    function cardMedia(s) {
      const img = getDriveUrl(s.imageUrl);
      const sw = `<div style="width:100%;height:100%;background:${getSwatchBg(s.color)};position:relative;"><div class="swatch-overlay"></div><div class="swatch-shimmer"></div></div>`;
      if (!img) return sw;
      return `<img src="${img}" alt="${s.name}" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy" onerror="this.outerHTML='${sw.replace(/'/g,"\\'")}'">`;
    }

    // ── STATE ─────────────────────────────────────────────────────────────────
    let allSarees = [];
    let activeFilters = { fabric: 'all', occasion: 'all', region: 'all' };

    // ── RENDER FILTERS ────────────────────────────────────────────────────────
    function buildFilters(data) {
      const unique = (key) => [...new Set(data.map(s => s[key]).filter(Boolean))];
      const capitalize = s => s.charAt(0).toUpperCase() + s.slice(1).replace(/-/g,' ');

      const makeButtons = (containerId, filterKey, values) => {
        const el = document.getElementById(containerId);
        const allCount = data.length;
        let html = `<button class="filter-btn active" data-filter="${filterKey}" data-value="all" onclick="setFilter('${filterKey}','all',this)">
          All <span class="filter-count">${allCount}</span></button>`;
        values.forEach(v => {
          const count = data.filter(s => s[filterKey] === v).length;
          html += `<button class="filter-btn" data-filter="${filterKey}" data-value="${v}" onclick="setFilter('${filterKey}','${v}',this)">
            ${capitalize(v)} <span class="filter-count">${count}</span></button>`;
        });
        el.innerHTML = html;
      };

      makeButtons('fabric-filters',   'fabric',   unique('fabric'));
      makeButtons('occasion-filters', 'occasion', unique('occasion'));
      makeButtons('region-filters',   'region',   unique('region').map(r =>
        data.find(s=>s.region===r)?.region).filter(Boolean));

      // Re-apply region labels in region filter
      const regionEl = document.getElementById('region-filters');
      regionEl.querySelectorAll('[data-filter="region"]:not([data-value="all"])').forEach(btn => {
        const r = btn.dataset.value;
        const label = data.find(s => s.region === r)?.regionLabel || r;
        btn.firstChild.textContent = label + ' ';
      });
    }

    // ── RENDER CARDS ─────────────────────────────────────────────────────────
    function renderCards(data) {
      const grid = document.getElementById('sarees-grid');
      document.getElementById('result-count').textContent = data.length;
      if (!data.length) {
        grid.innerHTML = `<div class="no-results"><h3>No sarees found</h3><p>Try adjusting your filters.</p></div>`;
        return;
      }
      grid.innerHTML = data.map(s => {
        const tags = (s.tags || '').split('|').filter(Boolean);
        return `
        <a href="saree-detail.html?id=${s.id}" class="saree-card">
          <div class="card-image">
            ${cardMedia(s)}
            ${s.badge ? `<div class="card-badge new">${s.badge}</div>` : ''}
            <div class="card-hover-overlay"><span class="hover-label">View Details</span></div>
          </div>
          <div class="card-body">
            <div class="card-region">${s.regionLabel || s.region}</div>
            <div class="card-name">${s.name}</div>
            <div class="card-fabric">${(s.fabric||'').replace(/-/g,' ')}</div>
            <div class="card-tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          </div>
        </a>`;
      }).join('');
    }

    // ── FILTER + SORT ─────────────────────────────────────────────────────────
    function getFiltered() {
      return allSarees.filter(s => {
        const f = activeFilters;
        return (f.fabric==='all'   || s.fabric===f.fabric) &&
               (f.occasion==='all' || s.occasion===f.occasion) &&
               (f.region==='all'   || s.region===f.region);
      });
    }
    function setFilter(type, value, btn) {
      activeFilters[type] = value;
      document.querySelectorAll(`[data-filter="${type}"]`).forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      updateActiveTagsUI(); renderCards(getFiltered());
    }
    function clearFilter(type) {
      activeFilters[type] = 'all';
      document.querySelectorAll(`[data-filter="${type}"]`).forEach(b=>b.classList.remove('active'));
      const allBtn = document.querySelector(`[data-filter="${type}"][data-value="all"]`);
      if (allBtn) allBtn.classList.add('active');
      updateActiveTagsUI(); renderCards(getFiltered());
    }
    function clearAllFilters() {
      activeFilters = { fabric:'all', occasion:'all', region:'all' };
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active', b.dataset.value==='all'));
      updateActiveTagsUI(); renderCards(getFiltered());
    }
    function sortSarees(value) {
      const data = getFiltered();
      if (value==='name-asc')  data.sort((a,b)=>a.name.localeCompare(b.name));
      if (value==='name-desc') data.sort((a,b)=>b.name.localeCompare(a.name));
      renderCards(data);
    }
    function setGrid(cols, btn) {
      document.getElementById('sarees-grid').className = 'sarees-grid'+(cols===2?' two-col':'');
      document.querySelectorAll('.grid-toggle').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    }
    function updateActiveTagsUI() {
      const tags = Object.entries(activeFilters).filter(([,v])=>v!=='all').map(([k,v])=>({type:k,label:v}));
      document.getElementById('active-filters').innerHTML = tags.map(t=>`
        <span class="active-tag">${t.label}<button onclick="clearFilter('${t.type}')">×</button></span>`).join('');
      document.getElementById('page-subtitle').textContent =
        tags.length ? `Filtered by: ${tags.map(t=>t.label).join(', ')}` : 'Showing all pieces from our catalogue';
    }

    // ── FETCH FROM GOOGLE SHEETS ──────────────────────────────────────────────
    async function loadSarees() {
      const grid = document.getElementById('sarees-grid');
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);font-family:var(--serif);font-size:18px;">Loading collection…</div>`;

      try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error('Sheet not reachable');
        const text = await res.text();
        allSarees = parseCSV(text).filter(s => s.id && s.name);

        if (!allSarees.length) throw new Error('No sarees found in sheet');

        buildFilters(allSarees);

        // Apply URL params
        const params = new URLSearchParams(window.location.search);
        if (params.get('filter')) {
          const v = params.get('filter');
          const btn = document.querySelector(`[data-filter="fabric"][data-value="${v}"]`) ||
                      document.querySelector(`[data-filter="occasion"][data-value="${v}"]`);
          if (btn) { activeFilters[btn.dataset.filter] = v; btn.classList.add('active'); updateActiveTagsUI(); }
        }
        if (params.get('region')) {
          const v = params.get('region');
          const btn = document.querySelector(`[data-filter="region"][data-value="${v}"]`);
          if (btn) { activeFilters.region = v; btn.classList.add('active'); updateActiveTagsUI(); }
        }

        renderCards(getFiltered());

      } catch (err) {
        console.error(err);
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:60px 24px;">
            <div style="font-family:var(--serif);font-size:24px;color:var(--text-secondary);margin-bottom:12px;">Collection coming soon</div>
            <div style="font-size:13px;color:var(--text-muted);max-width:400px;margin:0 auto;">
              The Google Sheet isn't connected yet. Add your Sheet ID to the SHEET_ID constant in the page code.
            </div>
          </div>`;
        // Clear filter loading states
        ['fabric-filters','occasion-filters','region-filters'].forEach(id => {
          document.getElementById(id).innerHTML = '<span style="font-size:12px;color:var(--text-muted)">—</span>';
        });
      }
    }

    loadSarees();
  </script>
</body>
</html>
