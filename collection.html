<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections — Saree Story</title>
  <meta name="description" content="Browse handpicked Indian sarees — Kanjivaram, Banarasi, Chanderi, Bandhani and more. Filter by fabric, occasion, and region." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: #222222;
      --gold: #C9A462;
      --gold-muted: rgba(201,164,98,0.12);
      --gold-light: #E2C17A;
      --text: #F0EAE0;
      --text-secondary: #888880;
      --text-muted: #555550;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(8,8,8,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--gold-light); }

    .nav-cta {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid var(--gold-muted);
      padding: 8px 20px;
      border-radius: 2px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 64px 48px 48px;
      border-bottom: 1px solid var(--border);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--gold-light); }
    .breadcrumb-sep { opacity: 0.4; }

    .page-title {
      font-family: var(--serif);
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .page-title em { font-style: italic; color: var(--gold-light); }

    .page-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* ── LAYOUT ── */
    .collection-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      min-height: 80vh;
    }

    /* ── SIDEBAR FILTERS ── */
    .filters-sidebar {
      padding: 40px 32px;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 65px;
      height: calc(100vh - 65px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .filters-sidebar h3 {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .filter-group {
      margin-bottom: 32px;
    }

    .filter-group-title {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .filter-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 300;
      padding: 6px 12px;
      border-radius: 2px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--border); }
    .filter-btn.active { color: var(--gold-light); border-color: var(--gold-muted); background: var(--gold-muted); }

    .filter-count {
      font-size: 11px;
      color: var(--text-muted);
    }

    .filter-clear {
      display: block;
      margin-top: 24px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .filter-clear:hover { color: var(--gold-light); }

    /* ── MAIN CONTENT ── */
    .main-content {
      padding: 40px 48px;
    }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .results-count {
      font-size: 13px;
      color: var(--text-muted);
    }
    .results-count strong {
      color: var(--text);
      font-weight: 400;
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .active-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      background: var(--gold-muted);
      border: 1px solid rgba(201,164,98,0.2);
      border-radius: 20px;
      color: var(--gold-light);
    }

    .active-tag button {
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      margin-left: 2px;
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 12px;
      font-family: var(--sans);
      padding: 6px 12px;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }
    .sort-select:focus { border-color: var(--gold-muted); }

    /* ── GRID ── */
    .grid-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .grid-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 8px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
    }
    .grid-toggle.active,
    .grid-toggle:hover { border-color: var(--gold-muted); color: var(--gold-light); }

    .sarees-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      transition: all 0.3s;
    }

    .sarees-grid.two-col { grid-template-columns: repeat(2, 1fr); }

    /* ── SAREE CARD ── */
    .saree-card {
      position: relative;
      text-decoration: none;
      color: inherit;
      display: block;
      overflow: hidden;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.3s, transform 0.3s;
    }
    .saree-card:hover { border-color: var(--gold-muted); transform: translateY(-4px); }

    .card-image {
      aspect-ratio: 3/4;
      overflow: hidden;
      position: relative;
    }

    .card-swatch {
      width: 100%; height: 100%;
      position: relative;
    }

    .swatch-kanjivaram { background: linear-gradient(135deg, #8B0000 0%, #C41E3A 25%, #8B0000 50%, #6B0000 75%, #8B0000 100%); }
    .swatch-banarasi   { background: linear-gradient(135deg, #1B3A6B 0%, #2E5FA3 30%, #1B3A6B 60%, #142D52 100%); }
    .swatch-chanderi   { background: linear-gradient(135deg, #F5F0E8 0%, #E8DCC8 30%, #F5F0E8 60%, #EDE4D0 100%); }
    .swatch-bandhani   { background: linear-gradient(135deg, #C44B8A 0%, #E8729A 30%, #C44B8A 60%, #A33572 100%); }
    .swatch-paithani   { background: linear-gradient(135deg, #2D6B45 0%, #3D8B5E 30%, #2D6B45 60%, #1E4A30 100%); }
    .swatch-mysore     { background: linear-gradient(135deg, #5B2D82 0%, #7B3DAF 30%, #5B2D82 60%, #3D1A5A 100%); }

    .swatch-overlay {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.03) 8px, rgba(255,255,255,0.03) 9px);
    }
    .swatch-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(201,164,98,0.12) 40%, rgba(201,164,98,0.22) 50%, rgba(201,164,98,0.12) 60%, transparent 100%);
    }

    .card-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }
    .card-badge.new { border-color: var(--gold-muted); color: var(--gold); }

    .card-hover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8,8,8,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saree-card:hover .card-hover-overlay { opacity: 1; }

    .hover-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-light);
      border: 1px solid var(--gold-muted);
      padding: 8px 20px;
      border-radius: 2px;
    }

    .card-body { padding: 16px 18px 20px; }

    .card-region {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .card-name {
      font-family: var(--serif);
      font-size: 19px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .card-fabric {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tag {
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* ── NO RESULTS ── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .no-results h3 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 300;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* ── MOBILE FILTER TOGGLE ── */
    .mobile-filter-btn {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 2px;
      cursor: pointer;
      font-family: var(--sans);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 40px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 80px;
    }
    .footer-copy { font-size: 12px; color: var(--text-muted); }
    .footer-logo { font-family: var(--serif); font-size: 18px; color: var(--gold-light); text-decoration: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .sarees-grid { grid-template-columns: repeat(2, 1fr); }
      nav { padding: 16px 32px; }
      .page-header { padding: 48px 32px 36px; }
      .main-content { padding: 32px; }
    }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .nav-cta { display: none; }
      .page-header { padding: 32px 20px; }
      .collection-layout { grid-template-columns: 1fr; }
      .filters-sidebar {
        position: static;
        height: auto;
        padding: 24px 20px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: none;
      }
      .filters-sidebar.open { display: block; }
      .mobile-filter-btn { display: block; }
      .main-content { padding: 24px 20px; }
      .sarees-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      footer { padding: 32px 20px; }
    }

    @media (max-width: 480px) {
      .sarees-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">Saree Story</a>
    <ul class="nav-links">
      <li><a href="collection.html" class="active">Collections</a></li>
      <li><a href="collection.html?filter=silk">Silks</a></li>
      <li><a href="collection.html?filter=cotton">Cottons</a></li>
      <li><a href="index.html#story">Our Story</a></li>
    </ul>
    <a href="collection.html" class="nav-cta">All Pieces</a>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb-sep">›</span>
      <span>Collections</span>
    </div>
    <h1 class="page-title">All <em>Collections</em></h1>
    <p class="page-subtitle" id="page-subtitle">Showing all pieces from our catalogue</p>
  </div>

  <!-- LAYOUT -->
  <div class="collection-layout">

    <!-- SIDEBAR -->
    <aside class="filters-sidebar" id="filterSidebar">
      <h3>Filter By</h3>

      <div class="filter-group">
        <div class="filter-group-title">Fabric</div>
        <div class="filter-options" id="fabric-filters">
          <button class="filter-btn active" data-filter="fabric" data-value="all" onclick="setFilter('fabric','all',this)">All Fabrics <span class="filter-count">6</span></button>
          <button class="filter-btn" data-filter="fabric" data-value="silk" onclick="setFilter('fabric','silk',this)">Silk <span class="filter-count">4</span></button>
          <button class="filter-btn" data-filter="fabric" data-value="cotton" onclick="setFilter('fabric','cotton',this)">Cotton <span class="filter-count">1</span></button>
          <button class="filter-btn" data-filter="fabric" data-value="georgette" onclick="setFilter('fabric','georgette',this)">Georgette <span class="filter-count">1</span></button>
          <button class="filter-btn" data-filter="fabric" data-value="silk-cotton" onclick="setFilter('fabric','silk-cotton',this)">Silk Cotton <span class="filter-count">1</span></button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Occasion</div>
        <div class="filter-options">
          <button class="filter-btn active" data-filter="occasion" data-value="all" onclick="setFilter('occasion','all',this)">All Occasions <span class="filter-count">6</span></button>
          <button class="filter-btn" data-filter="occasion" data-value="bridal" onclick="setFilter('occasion','bridal',this)">Bridal <span class="filter-count">2</span></button>
          <button class="filter-btn" data-filter="occasion" data-value="festive" onclick="setFilter('occasion','festive',this)">Festive <span class="filter-count">3</span></button>
          <button class="filter-btn" data-filter="occasion" data-value="casual" onclick="setFilter('occasion','casual',this)">Casual <span class="filter-count">1</span></button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Region</div>
        <div class="filter-options">
          <button class="filter-btn active" data-filter="region" data-value="all" onclick="setFilter('region','all',this)">All Regions <span class="filter-count">6</span></button>
          <button class="filter-btn" data-filter="region" data-value="tamilnadu" onclick="setFilter('region','tamilnadu',this)">Tamil Nadu <span class="filter-count">1</span></button>
          <button class="filter-btn" data-filter="region" data-value="up" onclick="setFilter('region','up',this)">Uttar Pradesh <span class="filter-count">1</span></button>
          <button class="filter-btn" data-filter="region" data-value="maharashtra" onclick="setFilter('region','maharashtra',this)">Maharashtra <span class="filter-count">1</span></button>
          <button class="filter-btn" data-filter="region" data-value="gujarat" onclick="setFilter('region','gujarat',this)">Gujarat <span class="filter-count">1</span></button>
          <button class="filter-btn" data-filter="region" data-value="mp" onclick="setFilter('region','mp',this)">Madhya Pradesh <span class="filter-count">1</span></button>
          <button class="filter-btn" data-filter="region" data-value="karnataka" onclick="setFilter('region','karnataka',this)">Karnataka <span class="filter-count">1</span></button>
        </div>
      </div>

      <button class="filter-clear" onclick="clearAllFilters()">Clear All Filters</button>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <div class="results-bar">
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <button class="mobile-filter-btn" onclick="document.getElementById('filterSidebar').classList.toggle('open')">
            ⊞ Filters
          </button>
          <div class="results-count"><strong id="result-count">6</strong> pieces</div>
          <div class="active-filters" id="active-filters"></div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <select class="sort-select" onchange="sortSarees(this.value)">
            <option value="default">Sort: Default</option>
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
          </select>
          <div class="grid-controls">
            <button class="grid-toggle active" onclick="setGrid(3, this)" title="3 columns">⊞</button>
            <button class="grid-toggle" onclick="setGrid(2, this)" title="2 columns">⊟</button>
          </div>
        </div>
      </div>

      <div class="sarees-grid" id="sarees-grid">
        <!-- Cards injected by JS -->
      </div>
    </main>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="index.html" class="footer-logo">Saree Story</a>
    <span class="footer-copy">© 2025 Saree Story. A celebration of Indian craft.</span>
  </footer>

  <script>
    const sarees = [
      {
        id: 1,
        name: "Crimson Kanjivaram Silk",
        fabric: "silk",
        occasion: "bridal",
        region: "tamilnadu",
        regionLabel: "Tamil Nadu",
        swatch: "swatch-kanjivaram",
        desc: "Deep crimson with gold zari borders. Woven on pit looms in Kanchipuram.",
        tags: ["Zari Work", "Wedding", "Heavy Silk"],
        badge: "New Arrival",
        badgeClass: "new"
      },
      {
        id: 2,
        name: "Royal Banarasi Silk",
        fabric: "silk",
        occasion: "bridal",
        region: "up",
        regionLabel: "Uttar Pradesh",
        swatch: "swatch-banarasi",
        desc: "Deep royal blue with intricate silver brocade from Varanasi.",
        tags: ["Brocade", "Bridal", "Silver Zari"],
        badge: null
      },
      {
        id: 3,
        name: "Ivory Chanderi Silk Cotton",
        fabric: "silk-cotton",
        occasion: "festive",
        region: "mp",
        regionLabel: "Madhya Pradesh",
        swatch: "swatch-chanderi",
        desc: "Gossamer-light ivory weave with delicate butti motifs.",
        tags: ["Festive", "Lightweight", "Butti"],
        badge: null
      },
      {
        id: 4,
        name: "Pink Bandhani Georgette",
        fabric: "georgette",
        occasion: "casual",
        region: "gujarat",
        regionLabel: "Gujarat",
        swatch: "swatch-bandhani",
        desc: "Vibrant tie-dye artistry in rose and magenta. Hand-knotted in Jamnagar.",
        tags: ["Tie-Dye", "Casual", "Handcrafted"],
        badge: null
      },
      {
        id: 5,
        name: "Emerald Paithani Silk",
        fabric: "silk",
        occasion: "festive",
        region: "maharashtra",
        regionLabel: "Maharashtra",
        swatch: "swatch-paithani",
        desc: "Rich emerald green with peacock motif border. A Maharashtrian treasure.",
        tags: ["Peacock Motif", "Festival", "Pure Silk"],
        badge: "Heritage Piece"
      },
      {
        id: 6,
        name: "Amethyst Mysore Silk",
        fabric: "silk",
        occasion: "festive",
        region: "karnataka",
        regionLabel: "Karnataka",
        swatch: "swatch-mysore",
        desc: "Luminous deep purple with golden border. Produced under the Karnataka Silk Industries.",
        tags: ["GI Tagged", "Pure Silk", "Gold Border"],
        badge: null
      }
    ];

    let activeFilters = { fabric: 'all', occasion: 'all', region: 'all' };
    let currentGrid = 3;

    function renderCards(data) {
      const grid = document.getElementById('sarees-grid');
      document.getElementById('result-count').textContent = data.length;

      if (data.length === 0) {
        grid.innerHTML = `<div class="no-results"><h3>No sarees found</h3><p>Try adjusting your filters.</p></div>`;
        return;
      }

      grid.innerHTML = data.map(s => `
        <a href="saree-detail.html" class="saree-card">
          <div class="card-image">
            <div class="card-swatch ${s.swatch}">
              <div class="swatch-overlay"></div>
              <div class="swatch-shimmer"></div>
            </div>
            ${s.badge ? `<div class="card-badge ${s.badgeClass || ''}">${s.badge}</div>` : ''}
            <div class="card-hover-overlay">
              <span class="hover-label">View Details</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-region">${s.regionLabel}</div>
            <div class="card-name">${s.name}</div>
            <div class="card-fabric">${s.fabric.replace('-', ' ')}</div>
            <div class="card-tags">
              ${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        </a>
      `).join('');
    }

    function getFiltered() {
      return sarees.filter(s => {
        const f = activeFilters;
        return (f.fabric === 'all' || s.fabric === f.fabric) &&
               (f.occasion === 'all' || s.occasion === f.occasion) &&
               (f.region === 'all' || s.region === f.region);
      });
    }

    function setFilter(type, value, btn) {
      activeFilters[type] = value;

      // Update button states for this group
      document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      updateActiveTagsUI();
      renderCards(getFiltered());
    }

    function updateActiveTagsUI() {
      const container = document.getElementById('active-filters');
      const tags = [];
      if (activeFilters.fabric !== 'all') tags.push({ type: 'fabric', label: activeFilters.fabric });
      if (activeFilters.occasion !== 'all') tags.push({ type: 'occasion', label: activeFilters.occasion });
      if (activeFilters.region !== 'all') tags.push({ type: 'region', label: activeFilters.region });

      container.innerHTML = tags.map(t => `
        <span class="active-tag">
          ${t.label}
          <button onclick="clearFilter('${t.type}')">×</button>
        </span>
      `).join('');

      document.getElementById('page-subtitle').textContent =
        tags.length ? `Filtered by: ${tags.map(t=>t.label).join(', ')}` : 'Showing all pieces from our catalogue';
    }

    function clearFilter(type) {
      activeFilters[type] = 'all';
      document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-filter="${type}"][data-value="all"]`).classList.add('active');
      updateActiveTagsUI();
      renderCards(getFiltered());
    }

    function clearAllFilters() {
      activeFilters = { fabric: 'all', occasion: 'all', region: 'all' };
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.value === 'all');
      });
      updateActiveTagsUI();
      renderCards(getFiltered());
    }

    function sortSarees(value) {
      const data = getFiltered();
      if (value === 'name-asc') data.sort((a,b) => a.name.localeCompare(b.name));
      if (value === 'name-desc') data.sort((a,b) => b.name.localeCompare(a.name));
      renderCards(data);
    }

    function setGrid(cols, btn) {
      currentGrid = cols;
      const grid = document.getElementById('sarees-grid');
      grid.className = 'sarees-grid' + (cols === 2 ? ' two-col' : '');
      document.querySelectorAll('.grid-toggle').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // Handle URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('filter')) {
      const val = params.get('filter');
      const btn = document.querySelector(`[data-filter="fabric"][data-value="${val}"]`) ||
                  document.querySelector(`[data-filter="occasion"][data-value="${val}"]`);
      if (btn) {
        const type = btn.dataset.filter;
        setFilter(type, val, btn);
      }
    }
    if (params.get('region')) {
      const val = params.get('region');
      const btn = document.querySelector(`[data-filter="region"][data-value="${val}"]`);
      if (btn) setFilter('region', val, btn);
    }

    // Initial render
    renderCards(getFiltered());
  </script>
</body>
</html>
